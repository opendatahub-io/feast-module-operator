# This rule is not used by the project opendatahub-feast-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over components.platform.opendatahub.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: opendatahub-feast-operator
  name: components-feastoperator-admin-role
rules:
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - feastoperators
  verbs:
  - '*'
- apiGroups:
  - components.platform.opendatahub.io
  resources:
  - feastoperators/status
  verbs:
  - get
